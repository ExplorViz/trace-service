syntax = "proto3";

option go_package = "github.com/ExplorViz/trace-service/internal/genproto/tokenpb";

message TokenEvent {
  EventType type = 1;
  LandscapeToken token = 2;
  optional string cloned_token_id = 3;
}

enum EventType {
  CREATED = 0;
  DELETED = 1;
  CLONED = 2;
  ACCESS_GRANTED = 3;
  ACCESS_REVOKED = 4;
}

message LandscapeToken {
  string id = 1;
  string secret = 2;
  string alias = 3;
  string owner_id = 4;
  uint64 created = 5;
}