version: "2"

linters:
  default: none

  enable:
    - errcheck
    - govet
    - protogetter
    - staticcheck
    - unused

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - protogetter

formatters:
  enable:
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/ExplorViz/trace-service
